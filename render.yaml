services:
  - type: web
    name: django-saas-demo
    runtime: python
    plan: free
    autoDeploy: false
    rootDir: .
    buildCommand: ./build.sh
    startCommand: ./start.sh
    healthCheckPath: /
    envVars:
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: django-saas-demo-db
          property: connectionString
      - key: CONN_MAX_AGE
        value: 30
      - key: PYTHON_VERSION
        value: 3.12.4

databases:
  - name: django-saas-demo-db
    plan: free
