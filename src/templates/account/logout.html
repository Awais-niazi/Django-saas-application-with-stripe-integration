{% extends "base.html" %}
{% load i18n %}
{% block head_title %}{% trans "Sign Out" %}{% endblock head_title %}
{% block content %}
<div class="max-w-md mx-auto p-6">
    <h1 class="text-2xl font-semibold mb-3">{% trans "Sign Out" %}</h1>
    <p class="mb-4">{% trans "Are you sure you want to sign out?" %}</p>
    <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        {{ redirect_field }}
        <button type="submit" class="px-4 py-2 bg-slate-900 text-white rounded">{% trans "Continue" %}</button>
    </form>
</div>
{% endblock content %}
