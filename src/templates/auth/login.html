{% extends "base.html" %}




{% block layout %}

{% if error %}
<p>{{ error }}</p>
{% endif %}

<form method="POST" action="/login/"> 
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" value="{{ entered_username|default:'' }}">
    <input type="password" name="password" placeholder="Your Password">

    <button type= "submit">Login</button>
     
</form>


{% endblock layout %}
