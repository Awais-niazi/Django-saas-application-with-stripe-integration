{% extends "base.html" %}




{% block layout %}

{% if error %}
<p>{{ error }}</p>
{% endif %}

<form method="POST" action="/register/"> 
    {% csrf_token %}
    <input type="text" name="username" placeholder="Pick your Username" value="{{ entered_username|default:'' }}">
    <input type="email" name="email" placeholder="Your Email" value="{{ entered_email|default:'' }}">
    <input type="password" name="password" placeholder="Your Password">

    <button type= "submit">Register</button>
     
</form>


{% endblock layout %}
