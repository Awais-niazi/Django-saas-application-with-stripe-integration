{% load static %}
<link href="{% static 'vendors/flowbite.min.css' %}" rel="stylesheet" />
<style>
@import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap");

:root {
    --bg: #f7efe4;
    --bg-deep: #f0e2cf;
    --surface: rgba(255, 252, 247, 0.72);
    --surface-strong: #fffaf2;
    --border: rgba(82, 54, 31, 0.12);
    --ink: #20150f;
    --muted: #6f5a4e;
    --accent: #c46a32;
    --accent-dark: #8f4319;
    --highlight: #ffd66b;
    --success: #1f8a70;
    --shadow: 0 30px 80px rgba(64, 36, 18, 0.12);
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
    color: var(--ink);
    background:
        radial-gradient(circle at top left, rgba(255, 214, 107, 0.38), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(196, 106, 50, 0.16), transparent 20%),
        radial-gradient(circle at bottom right, rgba(143, 67, 25, 0.12), transparent 25%),
        linear-gradient(180deg, #fbf4eb 0%, #f7efe4 42%, #efe3d0 100%);
}

h1, h2, h3, h4, h5, h6 {
    font-family: "Fraunces", Georgia, serif;
    letter-spacing: -0.03em;
}

a {
    transition: color 180ms ease, transform 180ms ease, opacity 180ms ease, background-color 180ms ease, border-color 180ms ease;
}

.site-frame {
    position: relative;
    overflow-x: hidden;
}

.site-frame::before,
.site-frame::after {
    content: "";
    position: fixed;
    z-index: 0;
    width: 26rem;
    height: 26rem;
    border-radius: 999px;
    filter: blur(70px);
    opacity: 0.5;
    pointer-events: none;
}

.site-frame::before {
    top: -6rem;
    left: -7rem;
    background: rgba(255, 214, 107, 0.3);
}

.site-frame::after {
    right: -8rem;
    bottom: -10rem;
    background: rgba(196, 106, 50, 0.22);
}

.site-content {
    position: relative;
    z-index: 1;
}

.site-header {
    transition:
        transform 260ms ease,
        background-color 260ms ease,
        border-color 260ms ease,
        box-shadow 260ms ease,
        backdrop-filter 260ms ease;
}

.site-header__inner,
.site-brand__mark,
.site-brand__name,
.site-brand__tag,
.site-nav-list {
    transition:
        padding 220ms ease,
        transform 220ms ease,
        font-size 220ms ease,
        letter-spacing 220ms ease,
        gap 220ms ease,
        opacity 220ms ease;
}

.site-header.is-scrolled {
    background: rgba(255, 248, 239, 0.86);
    border-color: rgba(82, 54, 31, 0.18);
    box-shadow: 0 16px 38px rgba(44, 24, 13, 0.12);
}

.site-header.is-scrolled .site-header__inner {
    padding-top: 0.7rem;
    padding-bottom: 0.7rem;
}

.site-header.is-scrolled .site-brand__mark {
    transform: scale(0.88);
}

.site-header.is-scrolled .site-brand__name {
    font-size: 1.35rem;
}

.site-header.is-scrolled .site-brand__tag {
    opacity: 0.76;
    letter-spacing: 0.18em;
}

.site-header.is-hidden {
    transform: translateY(calc(-100% - 1rem));
}

.glass-panel {
    background: var(--surface);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
}

.soft-panel {
    background: var(--surface-strong);
    border: 1px solid var(--border);
    box-shadow: 0 18px 40px rgba(48, 28, 16, 0.08);
}

.hero-shell {
    position: relative;
    padding: 2rem;
    border-radius: 2rem;
    overflow: hidden;
}

.hero-shell::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        linear-gradient(135deg, rgba(255,255,255,0.45), rgba(255,255,255,0.08)),
        radial-gradient(circle at 20% 20%, rgba(255,214,107,0.32), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(196,106,50,0.18), transparent 22%);
    pointer-events: none;
}

.hero-shell > * {
    position: relative;
    z-index: 1;
}

.eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    border-radius: 999px;
    background: rgba(255, 250, 242, 0.82);
    border: 1px solid rgba(130, 78, 41, 0.12);
    color: var(--accent-dark);
    padding: 0.5rem 0.95rem;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
}

.eyebrow::before {
    content: "";
    width: 0.5rem;
    height: 0.5rem;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--highlight), var(--accent));
}

.display-title {
    font-size: clamp(2.8rem, 5vw, 5.4rem);
    line-height: 0.95;
}

.lead-copy {
    font-size: 1.1rem;
    line-height: 1.8;
    color: var(--muted);
    max-width: 42rem;
}

.btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    padding: 0.95rem 1.35rem;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff8f1;
    font-weight: 700;
    box-shadow: 0 18px 30px rgba(143, 67, 25, 0.24);
}

.btn-primary:hover {
    transform: translateY(-1px);
    color: #fff8f1;
}

.btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.95rem 1.35rem;
    border-radius: 999px;
    background: rgba(255, 252, 247, 0.84);
    color: var(--ink);
    border: 1px solid rgba(82, 54, 31, 0.12);
}

.btn-secondary:hover {
    transform: translateY(-1px);
    color: var(--ink);
}

.kpi-card,
.feature-card,
.pricing-card,
.info-card {
    border-radius: 1.6rem;
    padding: 1.5rem;
}

.kpi-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,249,241,0.92));
    border: 1px solid var(--border);
    box-shadow: 0 14px 28px rgba(38, 22, 13, 0.08);
}

.kpi-value {
    font-family: "Fraunces", Georgia, serif;
    font-size: 2.6rem;
    line-height: 1;
}

.feature-card,
.pricing-card,
.info-card {
    background: rgba(255, 250, 242, 0.78);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(82, 54, 31, 0.1);
    box-shadow: 0 16px 32px rgba(38, 22, 13, 0.07);
}

.feature-card:hover,
.pricing-card:hover,
.info-card:hover {
    transform: translateY(-2px);
}

.pricing-card.featured {
    background: linear-gradient(180deg, rgba(255, 243, 224, 0.96), rgba(255, 251, 244, 0.88));
    border-color: rgba(196, 106, 50, 0.24);
}

.list-check {
    display: grid;
    gap: 0.75rem;
    color: var(--muted);
}

.list-check li {
    position: relative;
    padding-left: 1.6rem;
}

.list-check li::before {
    content: "•";
    position: absolute;
    left: 0;
    top: -0.05rem;
    color: var(--accent);
    font-size: 1.2rem;
}

.nav-pill {
    border-radius: 999px;
    padding: 0.6rem 0.95rem;
}

.nav-pill:hover {
    background: rgba(32, 21, 15, 0.05);
}

.nav-cta {
    border-radius: 999px;
    padding: 0.7rem 1.15rem;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff8f1;
    box-shadow: 0 14px 24px rgba(143, 67, 25, 0.24);
}

.nav-cta:hover {
    color: #fff8f1;
    transform: translateY(-1px);
}

.spot-grid {
    display: grid;
    gap: 1rem;
}

.spot-card {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding: 1.25rem;
    border-radius: 1.2rem;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(82, 54, 31, 0.08);
}

.metric-label,
.muted-copy {
    color: var(--muted);
}

.hero-mesh {
    position: absolute;
    right: -2rem;
    top: -1rem;
    width: 16rem;
    height: 16rem;
    border-radius: 999px;
    background:
        radial-gradient(circle, rgba(255, 214, 107, 0.42) 0, transparent 46%),
        radial-gradient(circle at 30% 30%, rgba(196, 106, 50, 0.42) 0, transparent 34%);
    filter: blur(10px);
    opacity: 0.95;
}

.page-kicker {
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent-dark);
}

.form-shell input,
.form-shell textarea,
.form-shell select {
    width: 100%;
    border-radius: 1rem;
    border: 1px solid rgba(82, 54, 31, 0.14);
    background: rgba(255, 252, 247, 0.9);
    padding: 0.9rem 1rem;
    color: var(--ink);
}

.form-shell input:focus,
.form-shell textarea:focus,
.form-shell select:focus {
    outline: 2px solid rgba(196, 106, 50, 0.18);
    border-color: rgba(196, 106, 50, 0.4);
}

.timeline-list {
    display: grid;
    gap: 1rem;
}

.timeline-item {
    padding: 1rem 1.1rem;
    border-radius: 1rem;
    background: rgba(255,255,255,0.56);
    border: 1px solid rgba(82, 54, 31, 0.1);
}

.auth-stage {
    position: relative;
    display: grid;
    gap: 1.5rem;
    align-items: stretch;
}

.auth-stage::before {
    content: "";
    position: absolute;
    inset: auto auto 8% -4%;
    width: 12rem;
    height: 12rem;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(255, 214, 107, 0.32), transparent 68%);
    filter: blur(16px);
    pointer-events: none;
}

.auth-card {
    position: relative;
    overflow: hidden;
    border-radius: 2rem;
    border: 1px solid rgba(82, 54, 31, 0.1);
    box-shadow: 0 24px 52px rgba(49, 29, 17, 0.1);
}

.auth-card--form {
    background: rgba(255, 251, 245, 0.9);
    backdrop-filter: blur(18px);
}

.auth-card--story {
    background:
        radial-gradient(circle at top right, rgba(255, 214, 107, 0.24), transparent 26%),
        linear-gradient(155deg, rgba(76, 42, 23, 0.98), rgba(143, 67, 25, 0.96));
    color: #fff7ee;
}

.auth-card__inner {
    position: relative;
    z-index: 1;
    padding: 2rem;
}

.auth-card--story::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        linear-gradient(145deg, rgba(255,255,255,0.05), transparent 36%),
        radial-gradient(circle at bottom left, rgba(255,214,107,0.18), transparent 30%);
    pointer-events: none;
}

.auth-kicker {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(255, 247, 238, 0.78);
}

.auth-stage .auth-card--form .auth-kicker {
    color: var(--accent-dark);
}

.auth-title {
    font-size: clamp(2.3rem, 4vw, 3.6rem);
    line-height: 0.96;
}

.auth-copy {
    color: rgba(255, 247, 238, 0.82);
    line-height: 1.8;
}

.auth-card--form .auth-copy {
    color: var(--muted);
}

.auth-points {
    display: grid;
    gap: 0.9rem;
    margin-top: 1.5rem;
}

.auth-point {
    padding: 1rem 1.1rem;
    border-radius: 1.1rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
}

.auth-point strong {
    display: block;
    margin-bottom: 0.25rem;
}

.auth-switch {
    display: inline-flex;
    gap: 0.6rem;
    align-items: center;
    padding: 0.35rem;
    border-radius: 999px;
    background: rgba(255, 248, 239, 0.9);
    border: 1px solid rgba(82, 54, 31, 0.1);
}

.auth-switch a {
    padding: 0.7rem 1rem;
    border-radius: 999px;
    color: var(--muted);
    font-weight: 600;
}

.auth-switch a.is-active {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff8f1;
    box-shadow: 0 10px 18px rgba(143, 67, 25, 0.18);
}

.auth-form {
    display: grid;
    gap: 1rem;
    margin-top: 1.5rem;
}

.auth-field {
    display: grid;
    gap: 0.45rem;
}

.auth-field label {
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--ink);
}

.auth-input-wrap {
    position: relative;
}

.auth-input {
    width: 100%;
    border-radius: 1rem;
    border: 1px solid rgba(82, 54, 31, 0.12);
    background: rgba(255, 252, 247, 0.92);
    padding: 0.95rem 1rem;
    color: var(--ink);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
}

.auth-input:focus {
    outline: none;
    border-color: rgba(196, 106, 50, 0.42);
    box-shadow: 0 0 0 4px rgba(196, 106, 50, 0.12);
    transform: translateY(-1px);
}

.auth-toggle {
    position: absolute;
    right: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--accent-dark);
    background: transparent;
    border: 0;
    cursor: pointer;
}

.auth-error {
    border-radius: 1rem;
    border: 1px solid rgba(190, 60, 54, 0.18);
    background: rgba(255, 235, 232, 0.86);
    color: #8d2b23;
    padding: 0.95rem 1rem;
    font-size: 0.95rem;
}

.auth-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.9rem;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.3rem;
}

.auth-meta {
    font-size: 0.92rem;
    color: var(--muted);
}

.auth-link {
    color: var(--accent-dark);
    font-weight: 700;
}

@media (max-width: 768px) {
    .site-header.is-hidden {
        transform: translateY(0);
    }

    .hero-shell {
        padding: 1.35rem;
    }

    .auth-card__inner {
        padding: 1.35rem;
    }

    .display-title {
        font-size: clamp(2.3rem, 11vw, 3.5rem);
    }
}
</style>
