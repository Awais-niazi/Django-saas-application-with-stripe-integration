{% load static %}
<script src="{% static 'vendors/flowbite.min.js' %}"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const header = document.getElementById("site-header");
    if (!header) {
        return;
    }

    let lastY = window.scrollY;
    const mobileWidth = 768;

    const updateHeaderState = () => {
        const currentY = window.scrollY;
        const scrollingDown = currentY > lastY;
        const pastThreshold = currentY > 24;
        const shouldHide = window.innerWidth > mobileWidth && scrollingDown && currentY > 140;

        header.classList.toggle("is-scrolled", pastThreshold);
        header.classList.toggle("is-hidden", shouldHide);

        lastY = currentY;
    };

    updateHeaderState();
    window.addEventListener("scroll", updateHeaderState, { passive: true });
    window.addEventListener("resize", updateHeaderState);
});

document.addEventListener("click", function (event) {
    const toggle = event.target.closest("[data-password-toggle]");
    if (!toggle) {
        return;
    }

    const targetId = toggle.getAttribute("data-password-toggle");
    const input = document.getElementById(targetId);
    if (!input) {
        return;
    }

    const isPassword = input.getAttribute("type") === "password";
    input.setAttribute("type", isPassword ? "text" : "password");
    toggle.textContent = isPassword ? "Hide" : "Show";
});
</script>
